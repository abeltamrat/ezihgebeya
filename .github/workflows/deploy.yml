name: Deploy EzihGebeya

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ezihgebeya-production
  cancel-in-progress: true

jobs:
  ftp-deploy:
    name: Deploy to ezihgebeya.nonstopplc.com
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ezihgebeya.nonstopplc.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Build production assets
        run: |
          npm ci
          npm --prefix frontend ci
          npm run css:build
          npm --prefix frontend run build
          npm run spa:sync

      - name: Verify deploy bundle
        run: |
          test -s app/index.html
          test -n "$(find app/assets -maxdepth 1 -type f -name '*.js' -print -quit)"
          test -n "$(find app/assets -maxdepth 1 -type f -name '*.css' -print -quit)"
          grep -q '/app/assets/' app/index.html
          echo "SPA shell and compiled assets are present in the FTP bundle."

      - name: FTP deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Fixed in-repo (instead of a secret) so it can never point at the
          # cPanel account root and never fail validation on a missing secret.
          server-dir: /ezihgebeya.nonstopplc.com/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            **/node_modules/**
            **/.DS_Store
            **/Thumbs.db
            **/*.log
            frontend/dist/**
            config.php
            database/outbox.log
            backups/**
            uploads/payments/**
            uploads/ui/**
            uploads/ar-models/**
