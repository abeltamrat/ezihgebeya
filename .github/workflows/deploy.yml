name: Deploy EzihGebeya

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ezihgebeya-production
  cancel-in-progress: true

jobs:
  ftp-deploy:
    name: Deploy to ezihgebeya.nonstopplc.com
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ezihgebeya.nonstopplc.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            **/.DS_Store
            **/Thumbs.db
            **/*.log
            database/outbox.log
            backups/**
            uploads/payments/**
            uploads/ui/**
            uploads/ar-models/**
